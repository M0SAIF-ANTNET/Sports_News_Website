<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <div class="container">
        <section class="stats">
            <h1>Sports Statistics</h1>
            <div class="cards">
                <div class="card">
                    <h2>75%</h2>
                    <p>Win Rate</p>
                </div>
                <div class="card">
                    <h2>120</h2>
                    <p>Matches Played</p>
                </div>
                <div class="card">
                    <h2>45</h2>
                    <p>Teams</p>
                </div>
            </div>
            <div class="chart">
                <h2>Team Performance</h2>
                <div class="bar" style="width: 90%;"><strong>Al Ahly</strong></div>
                <div class="bar" style="width: 70%;"><strong>Real Madrid</strong></div>
                <div class="bar" style="width: 50%;"><strong>Barcelona</strong></div>
            </div>
        </section>
    </div>
</body>
</html>
